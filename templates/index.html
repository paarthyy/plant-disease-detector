<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detector</title>
    <meta name="theme-color" content="#23452f">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    {% for css_file in frontend_assets.css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='frontend/' + css_file) }}">
    {% endfor %}
</head>
<body>
    <div id="root">
        {% if not frontend_assets.js %}
        <main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f5f0e6;color:#1d2b1f;font-family:Arial,sans-serif;">
            <div style="max-width:560px;background:#fffaf2;border:1px solid rgba(29,43,31,.12);border-radius:20px;padding:24px;">
                <h1 style="margin:0 0 12px;">Frontend build not found</h1>
                <p style="margin:0;line-height:1.6;">
                    Run <code>npm install</code> and <code>npm run build</code> to generate the React frontend assets,
                    then refresh this page.
                </p>
            </div>
        </main>
        {% endif %}
    </div>
    {% if frontend_assets.js %}
    <script type="module" src="{{ url_for('static', filename='frontend/' + frontend_assets.js) }}"></script>
    {% endif %}
</body>
</html>
